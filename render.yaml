services:
  - type: web
    name: hms-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./hms.db
      - key: SECRET_KEY
        generateValue: true
      - key: STRIPE_SECRET_KEY
        value: sk_test_your_stripe_key
